name: USD/JPY MACD アラート

on:
  schedule:
    # 毎15分ごとに実行（UTC）
    - cron: '*/15 * * * *'
  # GitHub の画面から手動テスト実行もできる
  workflow_dispatch:

jobs:
  check-macd:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: MACD クロスをチェック＆通知
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python macd_alert.py
